spring:
  flyway:
    enabled: false
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
cloud:
  aws:
    region:
      static: eu-west-1
    sns:
      client:
        endpoint: ${AWS_SNS_CLIENT_ENDPOINT:http://localhost:4566}
    sqs:
      client:
        endpoint: ${AWS_SQS_CLIENT_ENDPOINT:http://localhost:4566}


topic:
  task_status_updated: ${TOPIC_TASK_STATUS_UPDATED:arn:aws:sns:eu-west-1:000000000000:task_status_updated}


queue:
  step.processing.requested: ${QUEUE_STEP_PROCESSING_REQUESTED:http://localhost:4566/000000000000/StepProcessingRequested}
  employee.updated.anonymization.requested: ${QUEUE_EMPLOYEE_UPDATED_ANONYMIZATION_REQUESTED:http://localhost:4566/000000000000/EmployeeAnonymizationRequested}

groovy-shell:
  port: ${GROOVY_SHELL_PORT:16789}

otel:
  logs:
    exporter: none
  traces:
    sampler: always_on
