spring:
  datasource:
    hikari:
      allow-pool-suspension: true
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      boot:
        allow_jdbc_metadata_access: false
  sql:
    init:
      mode: never
  flyway:
    enabled: false
otel:
  logs:
    exporter: none
  traces:
    sampler: always_on
crac:
  enabled: ${CRAC_ENABLED:true}